<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultório Dr. Paulo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 100%;
        max-width: 420px;
        height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .chat-header {
        background: #0d6efd;
        color: white;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }

    .header-info h2 {
        font-size: 16px;
        font-weight: 600;
    }

    .header-info p {
        font-size: 12px;
        opacity: 0.85;
    }

    .chat-box {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #f0f2f5;
    }

    .message {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
    }

    .user {
        background: #0d6efd;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }

    .bot {
        background: white;
        color: #222;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .typing {
        background: white;
        align-self: flex-start;
        padding: 12px 16px;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        display: none;
    }

    .typing span {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #aaa;
        border-radius: 50%;
        margin: 0 2px;
        animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-6px); }
    }

    .input-area {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: white;
        border-top: 1px solid #eee;
    }

    input {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid #ddd;
        border-radius: 24px;
        outline: none;
        font-size: 14px;
        background: #f0f2f5;
    }

    input:focus {
        border-color: #0d6efd;
        background: white;
    }

    button {
        width: 42px;
        height: 42px;
        border: none;
        background: #0d6efd;
        color: white;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }

    button:hover { background: #0b5ed7; }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">👩‍⚕️</div>
        <div class="header-info">
            <h2>Maria — Secretária Virtual</h2>
            <p>Consultório Dr. Paulo • Online</p>
        </div>
    </div>

    <div id="chat" class="chat-box"></div>

    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Digite sua mensagem..." />
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
const WEBHOOK_URL = "https://soutocod.app.n8n.cloud/webhook/421ec65e-bd80-4e1f-b3e0-7d7bdda31754";

let historico = [];

function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const message = document.createElement("div");
    message.classList.add("message", sender);
    message.innerText = text;
    chat.appendChild(message);
    chat.scrollTop = chat.scrollHeight;
}

function setTyping(visible) {
    const typing = document.getElementById("typing");
    typing.style.display = visible ? "block" : "none";
    document.getElementById("chat").scrollTop = 99999;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (text === "") return;

    addMessage(text, "user");
    historico.push({ role: "user", content: text });
    input.value = "";
    setTyping(true);

    try {
        const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                message: text,
                historico: historico
            })
        });

        const data = await response.json();
        setTyping(false);
        addMessage(data.reply, "bot");
        historico.push({ role: "assistant", content: data.reply });

    } catch (error) {
        setTyping(false);
        addMessage("Erro ao conectar com o servidor 😢", "bot");
    }
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

window.onload = () => {
    setTimeout(() => {
        const boasVindas = "Olá! 😊 Sou a Maria, secretária virtual do Dr. Paulo. Como posso te ajudar hoje?";
        addMessage(boasVindas, "bot");
        historico.push({ role: "assistant", content: boasVindas });
    }, 500);
};
</script>

</body>
</html>
